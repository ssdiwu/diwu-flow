                  - paragraph [ref=e1113]:
                    - text: 首次启动时，macOS 可能会要求您确认打开来自已验证开发者的应用。点击
                    - strong [ref=e1114]: 打开
                    - text: 即可继续。
                  - generic [ref=e1115]:
                    - heading "为什么做 cmux？" [level=2] [ref=e1116]
                    - 'link "Permalink: 为什么做 cmux？" [ref=e1117] [cursor=pointer]':
                      - /url: "#为什么做-cmux"
                      - img [ref=e1118]
                  - paragraph [ref=e1120]: 我同时运行大量 Claude Code 和 Codex 会话。之前我用 Ghostty 开了一堆分割窗格，依靠 macOS 原生通知来了解代理何时需要我。但 Claude Code 的通知内容总是千篇一律的"Claude is waiting for your input"，没有任何上下文信息，而且标签页一多，连标题都看不清了。
                  - paragraph [ref=e1121]: 我试过几个编程协调工具，但大多数都是 Electron/Tauri 应用，性能让我不满意。我也更喜欢终端，因为 GUI 协调工具会把你锁定在它们的工作流里。所以我用 Swift/AppKit 构建了 cmux，作为一个原生 macOS 应用。它使用 libghostty 进行终端渲染，并读取您现有的 Ghostty 配置中的主题、字体和颜色设置。
                  - paragraph [ref=e1122]:
                    - text: 主要新增的是侧边栏和通知系统。侧边栏有垂直标签页，显示每个工作区的 git 分支、关联 PR 状态/编号、工作目录、监听端口和最新通知文本。通知系统能捕获终端序列（OSC 9/99/777），并提供 CLI（
                    - code [ref=e1123]: cmux notify
                    - text: ），您可以将其接入 Claude Code、OpenCode 等代理的钩子。当代理等待时，其窗格会显示蓝色光环，标签页会在侧边栏高亮，这样我就能在多个分割窗格和标签页之间一眼看出哪个需要我。⌘⇧U 可以跳转到最新的未读通知。
                  - paragraph [ref=e1124]:
                    - text: 内置浏览器拥有从
                    - link "agent-browser" [ref=e1125] [cursor=pointer]:
                      - /url: https://github.com/vercel-labs/agent-browser
                    - text: 移植的可脚本化 API。代理可以抓取无障碍树快照、获取元素引用、执行点击、填写表单和执行 JS。您可以在终端旁边分割出浏览器窗格，让 Claude Code 直接与您的开发服务器交互。
                  - paragraph [ref=e1126]: 所有操作都可以通过 CLI 和 socket API 进行脚本化 — 创建工作区/标签页、分割窗格、发送按键、在浏览器中打开 URL。
                  - generic [ref=e1127]:
                    - heading "The Zen of cmux" [level=2] [ref=e1128]
                    - 'link "Permalink: The Zen of cmux" [ref=e1129] [cursor=pointer]':
                      - /url: "#the-zen-of-cmux"
                      - img [ref=e1130]
                  - paragraph [ref=e1132]: cmux 不规定开发者应该如何使用工具。它是一个带有 CLI 的终端和浏览器，其余的由你决定。
                  - paragraph [ref=e1133]: cmux 是原语，而非解决方案。它提供终端、浏览器、通知、工作区、分割、标签页，以及控制这一切的 CLI。cmux 不强迫你以特定方式使用编程代理。你用这些原语构建什么，完全取决于你自己。
                  - paragraph [ref=e1134]: 最优秀的开发者一直在构建自己的工具。还没有人找到与代理协作的最佳方式，那些构建封闭产品的团队也没有找到。最接近自己代码库的开发者会最先找到答案。
                  - paragraph [ref=e1135]: 给一百万个开发者可组合的原语，他们会比任何自上而下设计的产品团队更快地找到最高效的工作流。
                  - generic [ref=e1136]:
