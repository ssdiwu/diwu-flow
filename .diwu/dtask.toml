# dtask.toml — 任务列表（状态真相源）
#
# 本文件由 /dinit 初始化创建，由 /dtask 管理。
# 格式：TOML，顶层 tasks 为数组表 [[tasks]]。
#
# 字段说明：
#   id           — 从 1 递增，永不复用
#   title        — 一句话描述（动词开头）
#   description  — 背景 + 关键约束
#   acceptance   — GWT 验收场景数组（Given...When...Then）
#   steps        — 实施步骤（绝对路径），[锁定]=技术选型，[建议]=实现细节
#   files_modified — 并行冲突检测（可选）
#   category     — functional/ui/bugfix/refactor/infra
#   blocked_by   — 前置任务 ID 数组（可选）
#   status       — InDraft/InSpec/InProgress/InReview/Done/Cancelled

[[tasks]]
id = 135
title = "dtask.json / dtask-state.json → TOML 迁移"
description = "将 dtask.json 和 dtask-state.json 从 JSON 迁移到 TOML，统一全项目数据格式。dsettings.toml 已先行迁移，这是遗留架构项。涉及 ~55 个文件（scripts/hooks/tests/rules/docs/templates）。\n\nTOML Schema 见 https://github.com/ssdiwu/diwu-flow-dev/issues/48"
acceptance = [
    "Given dtask.json/dtask-state.json 已改为 .toml 后缀  When 执行 pytest tests/ -q  Then 全量回归通过，无退化",
    "Given dtask.toml 和 dtask-state.toml 存在 When 用 tomllib.load() 读取 Then 解析成功无异常",
    "Given 所有 Python 脚本和 Hook 脚本 When 读取状态文件 Then 使用 TOML 格式读取，函数名和路径常量统一更新",
    "Given rules/skills/commands/.doc/ 中所有引用 When 全局搜索 dtask.json/dtask-state.json Then 全部替换为 dtask.toml/dtask-state.toml",
    "Given task.json.template When 迁移为 TOML 后 Then dinit.py 模板引用和 manifest.json 已更新",
]
steps = [
    "Layer 1: 基础设施 — common.py 路径常量 + _shared.py load_toml_fallback + dtask_state.py 全量改写",
    "Layer 2: Python 消费者 — dtask_transition.py dloop.py dstat.py drec_archive.py dinit.py",
    "Layer 3: Hook 脚本 — 7 个 hook 脚本路径和读写函数切换",
    "Layer 4: 测试夹具 — ~17 个测试文件 json.dumps → tomli_w.dumps",
    "Layer 5: 文档/规则 — ~20 个文件 .json → .toml 字符串替换",
    "Layer 6: 模板 — task.json.template → task.toml.template + manifest 更新",
]
files_modified = []
category = "refactor"
blocked_by = []
status = "Done"
